# Сборка AAB и загрузка во внутренний трек Google Play через Fastlane.
#
# Как публикуется:
# 1) Вручную: Actions → Deploy Android (Play internal) → Run workflow (нужны секреты).
# 2) Автоматически после мержа в main: когда workflow «Android version bump» пушит
#    коммит chore(android): bump … [skip version], этот workflow запускается на тот push
#    и заливает сборку с уже поднятой версией в build.gradle.
#
# Нужны секреты: ANDROID_KEYSTORE_*, GOOGLE_PLAY_JSON_KEY. Разово: Play Console (API, ключ подписи).
#
# Важно: бамп версии срабатывает на feat/fix/refactor в первой строке коммита. При merge через
# merge commit сообщение часто «Merge pull request…» — бампа нет → автодеплоя нет (запусти workflow вручную
# или мержи PR через squash с сообщением вида «feat: …»).
name: Deploy Android (Play internal)

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  JAVA_VERSION: "17"

concurrency:
  group: deploy-play-internal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       github.event.head_commit != null &&
       startsWith(github.event.head_commit.message, 'chore(android): bump'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;25.1.8937393

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: Install npm dependencies
        run: npm ci

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Bundle install (Fastlane)
        run: bundle install

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/android/app/upload.keystore"
          echo "ANDROID_KEYSTORE_PATH=${{ github.workspace }}/android/app/upload.keystore" >> "$GITHUB_ENV"

      - name: Configure release signing env
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Write Play API JSON key
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: |
          echo "$GOOGLE_PLAY_JSON_KEY" > "${{ github.workspace }}/play-store-credentials.json"
          echo "GOOGLE_PLAY_JSON_KEY_PATH=${{ github.workspace }}/play-store-credentials.json" >> "$GITHUB_ENV"

      - name: Fastlane deploy_internal
        run: bundle exec fastlane android deploy_internal
