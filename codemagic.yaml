# =============================================================================
# Личный аккаунт Codemagic (без платной Team)
# =============================================================================
# Team нужна только для совместной работы и отдельного биллинга. Приложение,
# репозиторий и переменные окружения настраиваются у КОНКРЕТНОГО приложения:
# Codemagic → твоё приложение → Settings → Environment variables.
#
# Подпись Android БЕЗ «Code signing identities» в Team: keystore хранится как
# base64 в секрете (официальный вариант):
# https://docs.codemagic.io/yaml-code-signing/alternative-code-signing-methods/
#
# В GIT не класть keystore, пароли и JSON ключей.
#
# --- Группа переменных (в UI при добавлении первой переменной задаёшь имя группы)
#     Имя группы должно совпадать с environment.groups ниже: movie_matcher_secrets
#
#   CM_KEYSTORE  (Secret)
#     Одна непрерывная строка base64 (без переносов в середине). Если вставил с
#     переносами — скрипт их убирает; если секрет обрезан лимитом UI — будет padding error.
#     Windows PowerShell:
#       [Convert]::ToBase64String([IO.File]::ReadAllBytes("путь\upload-keystore.p12")) | Set-Clipboard
#
#   CM_KEYSTORE_PASSWORD  (Secret)  — пароль хранилища .p12
#   CM_KEY_PASSWORD       (Secret)  — обычно тот же, что и у ключа
#   CM_KEY_ALIAS          — upload  (как у тебя в keytool -list)
#
#   CM_KEYSTORE_PATH  (не секрет; значение буквально такая строка:)
#     $CM_BUILD_DIR/upload-keystore.p12
#
#   GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS  (Secret)
#     Весь JSON сервисного аккаунта Google Play (см. доку Codemagic / Play Console)
# =============================================================================

workflows:
  android-release:
    name: "Android release (Google Play)"
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      # Имя должно ТОЧНО совпадать с группой в Codemagic → это приложение →
      # Settings → Environment variables (поле Group при добавлении переменной).
      # Если группа уже называется иначе (например google_play) — поменяй только эту строку.
      groups:
        - movie_matcher_secret
      vars:
        PACKAGE_NAME: "com.moviematcher"
      node: "20.11.1"
    scripts:
      - name: "Android local.properties"
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: "npm ci"
        script: |
          cd "$CM_BUILD_DIR"
          npm ci
      - name: "Decode keystore from CM_KEYSTORE"
        script: |
          if [ -z "$CM_KEYSTORE" ] || [ -z "$CM_KEYSTORE_PATH" ]; then
            echo "Задай CM_KEYSTORE и CM_KEYSTORE_PATH в Environment variables приложения."
            exit 1
          fi
          # Убираем пробелы/переносы из base64 (частая причина padding error при вставке в UI)
          CLEAN_B64=$(printf '%s' "$CM_KEYSTORE" | tr -d ' \n\r\t')
          printf '%s' "$CLEAN_B64" | base64 --decode > "$CM_KEYSTORE_PATH"
          SZ=$(wc -c < "$CM_KEYSTORE_PATH" | tr -d ' ')
          echo "Keystore после decode: $SZ байт"
          if [ "$SZ" -lt 200 ]; then
            echo "Файл слишком маленький — base64 в CM_KEYSTORE обрезан или неверен."
            exit 1
          fi
          # Проверка: пароль хранилища и целостность файла после base64
          if ! keytool -list -keystore "$CM_KEYSTORE_PATH" -storetype PKCS12 \
              -storepass "$CM_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "keytool не открыл keystore. Чаще всего: неверный CM_KEYSTORE_PASSWORD или обрезан/битый base64 в CM_KEYSTORE."
            keytool -list -keystore "$CM_KEYSTORE_PATH" -storetype PKCS12 \
              -storepass "$CM_KEYSTORE_PASSWORD" 2>&1 | head -15 || true
            exit 1
          fi
      - name: "Gradle bundleRelease"
        script: |
          export ANDROID_KEYSTORE_PATH="$CM_KEYSTORE_PATH"
          export ANDROID_KEYSTORE_PASSWORD="$CM_KEYSTORE_PASSWORD"
          export ANDROID_KEY_ALIAS="$CM_KEY_ALIAS"
          export ANDROID_KEY_PASSWORD="$CM_KEY_PASSWORD"
          cd "$CM_BUILD_DIR/android"
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
